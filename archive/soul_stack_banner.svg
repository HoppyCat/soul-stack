<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SoulMode — soul-stack GitHub README banner</title>
<desc>Dark banner reading 'SoulMode' with tagline 'Most platforms give you more features. We give you true ownership.' with blue-green brand colors on black background</desc>

<rect width="680" height="200" fill="#080810"/>
<rect x="0" y="0" width="3" height="200" fill="#4BB8C5"/>
<!-- star field -->
<circle cx="560" cy="40" r="1.2" fill="#4BB8C5" opacity="0.8"/>
<circle cx="590" cy="70" r="0.8" fill="#00C875" opacity="0.5"/>
<circle cx="620" cy="30" r="1.5" fill="#4BB8C5" opacity="0.6"/>
<circle cx="640" cy="90" r="0.9" fill="#00C875" opacity="0.4"/>
<circle cx="610" cy="120" r="1.1" fill="#4BB8C5" opacity="0.5"/>
<circle cx="655" cy="55" r="0.7" fill="#e8e4dc" opacity="0.3"/>
<circle cx="570" cy="100" r="1.3" fill="#00C875" opacity="0.3"/>
<circle cx="635" cy="150" r="0.9" fill="#4BB8C5" opacity="0.4"/>
<circle cx="580" cy="160" r="0.6" fill="#e8e4dc" opacity="0.25"/>
<circle cx="660" cy="130" r="1.2" fill="#00C875" opacity="0.35"/>
<circle cx="545" cy="75" r="0.8" fill="#4BB8C5" opacity="0.6"/>
<circle cx="625" cy="170" r="1.0" fill="#e8e4dc" opacity="0.2"/>
<!-- main heading -->
<text x="36" y="78" font-family="Georgia, serif" font-size="46" font-weight="700" font-style="italic" letter-spacing="-0.5"><tspan fill="#4BB8C5">Soul</tspan><tspan fill="#00C875">Mode</tspan></text>
<!-- tagline line 1 -->
<text x="38" y="110" font-family="Georgia, serif" font-size="16" font-weight="300" font-style="italic" fill="#b8a99a" letter-spacing="0.3">Most platforms give you more features.</text>
<!-- tagline line 2 -->
<text x="38" y="130" font-family="Georgia, serif" font-size="16" font-weight="400" font-style="italic" fill="#e8e4dc" letter-spacing="0.3">We give you true ownership.</text>
<!-- divider -->
<rect x="36" y="148" width="320" height="0.5" fill="#4BB8C5" opacity="0.5"/>
<!-- attribution -->
<text x="36" y="168" font-family="'Courier New', monospace" font-size="12" fill="#00C875" opacity="0.7" letter-spacing="0.12em">A FRAMEWORK FOR SOUL FILES · SOULMODE.IO · CC-BY-NC 4.0</text>
<!-- github url -->
<text x="36" y="186" font-family="'Courier New', monospace" font-size="11" fill="#4BB8C5" opacity="0.8" letter-spacing="0.08em">github.com/HoppyCat/soul-stack</text>
</svg>
