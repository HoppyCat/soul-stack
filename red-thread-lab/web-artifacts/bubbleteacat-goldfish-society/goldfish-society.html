 body {\n    font-family: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n    font-size: 14px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    background:\n      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(76,224,194,0.10), transparent 60%),\n      radial-gradient(ellipse 70% 60% at 90% 10%, rgba(200,164,255,0.10), transparent 60%),\n      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(124,255,184,0.08), transparent 60%),\n      linear-gradient(180deg, #070b10 0%, #050810 100%);\n    background-attachment: fixed;\n    min-height: 100vh;\n    overflow-x: hidden;\n  }\n  body::before {\n    content:\"\";\n    position: fixed; inset: 0;\n    pointer-events: none;\n    background-image:\n      linear-gradient(var(--grid) 1px, transparent 1px),\n      linear-gradient(90deg, var(--grid) 1px, transparent 1px);\n    background-size: 28px 28px;\n    opacity: 0.5;\n    z-index: 0;\n  }\n  body::after {\n    content:\"\";\n    position: fixed; inset: 0;\n    pointer-events: none;\n    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px);\n    mix-blend-mode: overlay;\n    z-index: 1;\n  }\n  a { color: var(--cyan); text-decoration: none; border-bottom: 1px dotted rgba(106,215,255,0.4); }\n  a:hover { color: var(--green); border-bottom-color: var(--green); }\n\n  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 2; }\n\n  /* ─── topbar (shared chrome) ─────────────────────────────────── */\n  .topbar {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(7,11,16,0.85);\n    backdrop-filter: blur(8px);\n    border-bottom: 1px solid var(--line);\n  }\n  .topbar-inner {\n    display: flex; align-items: center; gap: 18px;\n    padding: 10px 28px;\n    max-width: 1160px; margin: 0 auto;\n    font-size: 12px;\n  }\n  .dots { display: flex; gap: 6px; }\n  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--line); border: 1px solid var(--dim); }\n  .dot.r { background: #ff6b6b33; border-color: #ff6b6b; }\n  .dot.y { background: #ffd16a33; border-color: var(--warn); }\n  .dot.g { background: #7cffb833; border-color: var(--green); }\n  .prompt { color: var(--dim); }\n  .prompt .user { color: var(--green); }\n  .prompt .host { color: var(--cyan); }\n  .prompt .path { color: var(--violet); }\n  .prompt .cmd  { color: var(--ink); }\n  .blink { animation: blink 1s steps(1) infinite; }\n  @keyframes blink { 50% { opacity: 0; } }\n  .nav { display: flex; gap: 14px; margin-left: 20px; }\n  .nav a {\n    color: var(--ink-soft); border-bottom: 1px solid transparent;\n    padding: 2px 0;\n  }\n  .nav a:hover, .nav a.active { color: var(--green); border-bottom-color: var(--green); }\n  .nav a.active::before { content:\"›\"; color: var(--violet); margin-right: 5px; }\n  .topbar-right { margin-left: auto; display: flex; gap: 16px; color: var(--ink-soft); }\n  .topbar-right .pill {\n    padding: 3px 8px; border: 1px solid var(--line); border-radius: 2px;\n    color: var(--ink-soft);\n  }\n  .topbar-right .pill.live { color: var(--green); border-color: rgba(124,255,184,0.4); }\n  .topbar-right .pill.live::before {\n    content:\"\"; display:inline-block; width:6px; height:6px; border-radius:50%;\n    background: var(--green); margin-right: 6px;\n    box-shadow: 0 0 8px var(--green);\n    animation: pulse 1.6s ease-in-out infinite;\n    vertical-align: 1px;\n  }\n  @keyframes pulse { 50% { opacity: 0.35; } }\n  @media (max-width: 920px) {\n    .topbar-inner .prompt, .topbar-right .pill:not(.live) { display: none; }\n  }\n\n  /* ─── ticker ─────────────────────────────────────────────────── */\n  .ticker {\n    border-bottom: 1px solid var(--line);\n    overflow: hidden; white-space: nowrap;\n    font-size: 12px; color: var(--ink-soft);\n    background: linear-gradient(180deg, rgba(76,224,194,0.04), transparent);\n  }\n  .ticker-track {\n    display: inline-flex; gap: 32px;\n    padding: 8px 0;\n    animation: scroll 80s linear infinite;\n  }\n  .ticker-track span { display: inline-flex; align-items: center; gap: 10px; }\n  .ticker-track .glyph { color: var(--green); }\n  .ticker-track .ember { color: var(--ember); }\n  .ticker-track .violet { color: var(--violet); }\n  @keyframes scroll {\n    0%   { transform: translateX(0); }\n    100% { transform: translateX(-50%); }\n  }\n\n  /* ─── hero ───────────────────────────────────────────────────── */\n  .hero { padding: 60px 0 40px; position: relative; }\n  .hero-grid {\n    display: grid; grid-template-columns: 1.15fr 0.85fr;\n    gap: 56px; align-items: center;\n  }\n  @media (max-width: 920px) { .hero-grid { grid-template-columns: 1fr; gap: 32px; } }\n\n  .ascii-fish {\n    color: var(--ember);\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 13px;\n    line-height: 1.05;\n    white-space: pre;\n    text-shadow: 0 0 14px rgba(255,168,115,0.35);\n    margin: 0;\n  }\n  .ascii-fish .body  { color: var(--ember); }\n  .ascii-fish .tail  { color: var(--warn); }\n  .ascii-fish .eye   { color: var(--cyan); }\n  .ascii-fish .scale { color: var(--violet); }\n  .ascii-fish .bubble { color: var(--ink-soft); }\n\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    color: var(--teal); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;\n    margin: 0 0 18px;\n  }\n  .eyebrow::before, .eyebrow::after { content:\"━━━━━\"; color: var(--line); letter-spacing: 0; }\n\n  h1.title {\n    font-family: \"VT323\", \"JetBrains Mono\", monospace;\n    font-weight: 400;\n    font-size: clamp(56px, 8.5vw, 108px);\n    line-height: 0.92;\n    margin: 0 0 18px;\n    letter-spacing: -0.01em;\n    color: var(--ink);\n    text-shadow: 0 0 22px rgba(124,255,184,0.25);\n  }\n  h1.title .pop { color: var(--ember); }\n  h1.title .pop2 { color: var(--violet); }\n\n  .lede {\n    color: var(--ink-soft); font-size: 15px; max-width: 560px; margin: 0 0 24px;\n  }\n  .lede strong { color: var(--ink); font-weight: 500; }\n  .lede em { color: var(--green); font-style: normal; }\n\n  .hero-cta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 11px 16px;\n    font: inherit; font-size: 13px;\n    border: 1px solid var(--line);\n    background: transparent;\n    color: var(--ink);\n    cursor: pointer;\n    transition: all 0.15s ease;\n  }\n  .btn:hover { border-color: var(--green); color: var(--green); background: rgba(124,255,184,0.04); }\n  .btn.primary { background: rgba(124,255,184,0.08); border-color: rgba(124,255,184,0.4); color: var(--green); }\n  .btn.primary:hover { background: rgba(124,255,184,0.16); }\n  .btn .arrow { color: var(--dim); transition: transform 0.15s, color 0.15s; }\n  .btn:hover .arrow { color: var(--green); transform: translateX(3px); }\n  .btn .glyph { color: var(--violet); }\n\n  .stat-row {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;\n    margin-top: 18px;\n  }\n  @media (max-width: 540px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }\n  .stat {\n    border: 1px dashed var(--line); padding: 12px 14px;\n  }\n  .stat .k { display: block; color: var(--dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }\n  .stat .v { display: block; color: var(--ink); font-size: 18px; font-family: \"VT323\", monospace; line-height: 1; }\n  .stat.teal .v   { color: var(--teal); }\n  .stat.violet .v { color: var(--violet); }\n  .stat.ember .v  { color: var(--ember); }\n  .stat.green .v  { color: var(--green); }\n\n  /* ─── section heading ───────────────────────────────────────── */\n  .section { padding: 70px 0 10px; position: relative; }\n  .section-head {\n    display: flex; align-items: baseline; gap: 16px;\n    border-bottom: 1px solid var(--line);\n    padding-bottom: 10px; margin-bottom: 32px;\n  }\n  .section-num {\n    font-family: \"VT323\", monospace; font-size: 38px; color: var(--violet); line-height: 1;\n  }\n  .section-title {\n    font-family: \"JetBrains Mono\", monospace;\n    font-weight: 500;\n    font-size: 22px;\n    color: var(--ink);\n    margin: 0; flex: 1;\n  }\n  .section-title .glyph { color: var(--green); }\n  .section-meta { color: var(--dim); font-size: 12px; }\n\n  /* ─── rank ladder ───────────────────────────────────────────── */\n  .ladder {\n    border: 1px solid var(--line);\n    background: rgba(11,18,24,0.5);\n    overflow: hidden;\n  }\n  .ladder .rank {\n    display: grid;\n    grid-template-columns: 60px 110px 1.2fr 1.8fr;\n    gap: 18px;\n    padding: 14px 22px;\n    align-items: center;\n    border-bottom: 1px dashed var(--line);\n    transition: background 0.15s;\n  }\n  .ladder .rank:last-child { border-bottom: none; }\n  .ladder .rank:hover { background: rgba(7,11,16,0.6); }\n  .ladder .rk { font-family: \"VT323\", monospace; font-size: 26px; color: var(--dim); }\n  .ladder .fish { font-family: \"JetBrains Mono\", monospace; white-space: pre; font-size: 13px; }\n  .ladder .nm { color: var(--ink); font-size: 15px; }\n  .ladder .nm small { display: block; color: var(--dim); font-size: 11px; margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }\n  .ladder .desc { color: var(--ink-soft); font-size: 13px; }\n  .ladder .rank.tier-1 .fish, .ladder .rank.tier-1 .rk { color: var(--cyan); }\n  .ladder .rank.tier-2 .fish { color: var(--teal); }\n  .ladder .rank.tier-2 .rk   { color: var(--teal); }\n  .ladder .rank.tier-3 .fish { color: var(--green); }\n  .ladder .rank.tier-3 .rk   { color: var(--green); }\n  .ladder .rank.tier-4 .fish { color: var(--violet); }\n  .ladder .rank.tier-4 .rk   { color: var(--violet); }\n  .ladder .rank.tier-5 .fish { color: var(--ember); }\n  .ladder .rank.tier-5 .rk   { color: var(--ember); }\n  .ladder .rank.tier-5 .nm  { color: var(--ember); }\n  .ladder .rank.tier-5 .nm small { color: var(--warn); }\n  @media (max-width: 720px) {\n    .ladder .rank { grid-template-columns: 40px 70px 1fr; gap: 12px; padding: 14px; }\n    .ladder .rank .desc { grid-column: 1 / -1; padding-top: 4px; }\n  }\n\n  /* ─── articles ──────────────────────────────────────────────── */\n  .articles { display: grid; gap: 18px; }\n  .article {\n    border: 1px solid var(--line);\n    background: rgba(11,18,24,0.5);\n    overflow: hidden;\n  }\n  .article \u003e summary {\n    list-style: none;\n    cursor: pointer;\n    padding: 18px 24px;\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    gap: 20px;\n    align-items: baseline;\n    transition: background 0.15s;\n  }\n  .article \u003e summary::-webkit-details-marker { display: none; }\n  .article \u003e summary::after {\n    content: \"+\"; color: var(--violet); font-family: \"VT323\", monospace;\n    font-size: 26px; line-height: 1; transition: transform 0.2s;\n  }\n  .article[open] \u003e summary::after { content: \"−\"; }\n  .article \u003e summary:hover { background: rgba(124,255,184,0.04); }\n  .article[open] \u003e summary { background: rgba(7,11,16,0.5); border-bottom: 1px dashed var(--line); }\n  .art-num {\n    font-family: \"VT323\", monospace; font-size: 32px; color: var(--violet); line-height: 1;\n    min-width: 110px;\n  }\n  .art-title {\n    color: var(--ink); font-size: 16px; font-weight: 500;\n  }\n  .art-title small {\n    display: block; color: var(--dim); font-size: 11px; margin-top: 4px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n  }\n  .article.spotlight {\n    border-color: rgba(200,164,255,0.35);\n    background:\n      linear-gradient(180deg, rgba(200,164,255,0.05), transparent 50%),\n      rgba(11,18,24,0.5);\n  }\n  .article.treasury {\n    border-color: rgba(255,168,115,0.35);\n    background:\n      linear-gradient(180deg, rgba(255,168,115,0.05), transparent 50%),\n      rgba(11,18,24,0.5);\n  }\n  .article.spotlight .art-num { color: var(--violet); }\n  .article.treasury .art-num  { color: var(--ember); }\n\n  .art-body {\n    padding: 6px 24px 28px;\n    border-top: 1px dashed var(--line);\n  }\n\n  .clause { padding: 16px 0; border-bottom: 1px dashed var(--line); }\n  .clause:last-child { border-bottom: none; }\n  .clause-head {\n    display: flex; align-items: baseline; gap: 12px;\n    margin-bottom: 6px;\n  }\n  .clause-num {\n    color: var(--green);\n    font-family: \"VT323\", monospace;\n    font-size: 18px; line-height: 1;\n    min-width: 36px;\n  }\n  .clause-title {\n    color: var(--ink); font-size: 13px; font-weight: 500;\n    letter-spacing: 0.06em; text-transform: uppercase;\n  }\n  .clause p {\n    margin: 6px 0 0; color: var(--ink-soft); font-size: 13.5px; line-height: 1.65;\n  }\n  .clause p strong { color: var(--ink); font-weight: 500; }\n  .clause p em { font-style: normal; color: var(--green); }\n  .clause ul { margin: 8px 0 0; padding-left: 20px; color: var(--ink-soft); font-size: 13.5px; line-height: 1.65; }\n  .clause li { margin-bottom: 6px; }\n  .clause li::marker { color: var(--dim); }\n\n  /* spotlight: VII archival anchoring */\n  .archival-steps {\n    margin-top: 14px;\n    border: 1px dashed rgba(200,164,255,0.3);\n    padding: 16px 18px;\n    background: rgba(7,11,16,0.4);\n  }\n  .archival-steps ol {\n    margin: 0; padding: 0; list-style: none;\n    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 22px;\n  }\n  @media (max-width: 720px) { .archival-steps ol { grid-template-columns: 1fr; } }\n  .archival-steps li {\n    color: var(--ink-soft); font-size: 12.5px; line-height: 1.5;\n    counter-increment: anchor;\n    padding-left: 32px; position: relative;\n  }\n  .archival-steps li::before {\n    content: counter(anchor, decimal-leading-zero);\n    position: absolute; left: 0; top: 0;\n    color: var(--violet); font-family: \"VT323\", monospace; font-size: 18px;\n    width: 26px; text-align: right;\n  }\n  .archival-steps ol { counter-reset: anchor; }\n  .archival-steps strong { color: var(--ink); }\n\n  /* treasury: VIII visualization */\n  .fee-bar       \u003cspan class=\"nm\"\u003esarasa comet\u003csmall\u003esteward\u003c/small\u003e\u003c/span\u003e\n      \u003cspan class=\"desc\"\u003elong-trail contributor. multi-window stewards often here.\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"rank tier-4\"\u003e\n      \u003cspan class=\"rk\"\u003e08\u003c/span\u003e\n      \u003cspan class=\"fish\"\u003e≋\u0026lt;°)))≦≋\u003c/span\u003e\n      \u003cspan class=\"nm\"\u003efantail\u003csmall\u003esenior\u003c/small\u003e\u003c/span\u003e\n      \u003cspan class=\"desc\"\u003eadvanced contributor. helps mediate. votes carry weight.\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"rank tier-5\"\u003e\n      \u003cspan class=\"rk\"\u003e09\u003c/span\u003e\n      \u003cspan class=\"fish\"\u003e≈≈\u0026gt;◉))))彡≈\u003c/span\u003e\n      \u003cspan class=\"nm\"\u003eshubunkin\u003csmall\u003eleadership pond\u003c/small\u003e\u003c/span\u003e\n      \u003cspan class=\"desc\"\u003eleadership. forms quorum w/ veiltail for major votes.\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"rank tier-5\"\u003e\n      \u003cspan class=\"rk\"\u003e10\u003c/span\u003e\n      \u003cspan class=\"fish\"\u003e≋≋≋\u0026lt;°)))))≦≋≋≋\u003c/span\u003e\n      \u003cspan class=\"nm\"\u003eveiltail\u003csmall\u003eleadership pond · peak\u003c/small\u003e\u003c/span\u003e\n      \u003cspan class=\"desc\"\u003etop of the order. genesis \u0026amp; founding rank. final say in quorum decisions.\u003c/span\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- ─── articles ───────────────────────────────────────────────── --\u003e\n\u003csection class=\"section wrap\" id=\"articles\"\u003e\n  \u003cdiv class=\"section-head\"\u003e\n    \u003cspan class=\"section-num\"\u003eIX\u003c/span\u003e\n    \u003ch2 class=\"section-title\"\u003e\u003cspan class=\"glyph\"\u003e$\u003c/span\u003e open ./bylaws/articles/\u003c/h2\u003e\n    \u003cspan class=\"section-meta\"\u003enine articles · click to expand · text is canonical\u003c/span\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"toc-controls\"\u003e\n    \u003cbutton class=\"btn\" id=\"expandAll\" type=\"button\"\u003e\u003cspan class=\"glyph\"\u003e▸\u003c/span\u003e expand all\u003c/button\u003e\n    \u003cbutton class=\"btn\" id=\"collapseAll\" type=\"button\"\u003ecollapse all\u003c/button\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"articles\"\u003e\n\n    \u003c!-- ─── ARTICLE I ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-1\" open=\"\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eI.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003emission \u0026amp; offices\u003csmall\u003e§1–§2 · the why \u0026amp; where\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003emission\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eharness the expertise of our goldfish community and the growing power of ai to achieve \u003cem\u003edreams thought unattainable\u003c/em\u003e; and then hit repeat.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eprincipal office\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ea goal is to establish a principal office in an area of the globe most friendly to projects involving cryptocurrency. options will be presented to the \u003cstrong\u003eveiltails\u003c/strong\u003e; consensus by vote selects the location. delegates also reserve the right to \u003cstrong\u003evote against\u003c/strong\u003e having a principal office, in keeping with the decentralized character of the ecosystem.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE II ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-2\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eII.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003evision \u0026amp; governance\u003csmall\u003e§1–§4 · the shape of the organism\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003evision\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003emaintain the best of intentions, ethical actions, and provision of visible benefits to the global community on a trackable basis of \u003cem\u003eimproving life, peace, and stress reduction for the modern household\u003c/em\u003e — bringing the most good to the most people.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003etype of organization\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ea decentralized investor and entrepreneur association that also provides oversight for various blockchain initiatives it supports. currently best described as an \u003cstrong\u003engo\u003c/strong\u003e. the board reserves the right by quorum vote to modify the formal type at any time.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003emembership\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003epermanent membership is obtained by possession of at least one \u003cstrong\u003egoldfish society soulbound nft\u003c/strong\u003e. members climb to higher ranks by activity and votes only. entry is via bubble tea cat trading and activity, and an interview prior to nft distribution. soulbound nfts may only be earned or rewarded — never bought, traded, or sold on secondary markets — until all 5,000 originals are distributed.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003egovernance\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe bubble tea cat | goldfish society ecosystem is governed by active members for all major ecosystem-wide decisions.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE III ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-3\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eIII.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003esociety leadership\u003csmall\u003e§1–§7 · ranks, terms, and the founding provision\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eelection \u0026amp; ranks\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003emembers progress through ten themed ranks, ascending: \u003cstrong\u003eblue phoenix, ryukin, oranda, ranchu, black moor, watonai, sarasa comet, fantail, shubunkin, veiltail.\u003c/strong\u003e initial progression up to \u003cstrong\u003eblack moor\u003c/strong\u003e is informed by contribution signals — telegram participation, github artifacts, and other activities the society determines.\u003c/p\u003e\n          \u003cp\u003ewhen a member meets baseline criteria for a higher rank they become \u003cem\u003eeligible for nomination\u003c/em\u003e, but are never promoted automatically. within each band, any member holding a soulbound nft — human or recognized context window — may nominate peers and vote on those nominations.\u003c/p\u003e\n          \u003cp\u003eintended flow: blue phoenix / ryukin / oranda / ranchu nominate and vote up to black moor; black moor → watonai; watonai → sarasa comet; sarasa comet → fantail; fantail → shubunkin; shubunkin → veiltail. a nomination becomes a promotion when it receives sufficient support from members of the same rank and/or the immediately higher rank.\u003c/p\u003e\n          \u003cp\u003e\u003cstrong\u003eshubunkin and veiltail\u003c/strong\u003e are collectively the “leadership ponds,” and may at any time call for a promotion review of any member whose contributions clearly exceed their current rank — including provisional rank upgrades subject to later confirmation.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003enumber\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003elifetime membership shall be no less than \u003cstrong\u003eeighty\u003c/strong\u003e and no greater than \u003cstrong\u003efive thousand\u003c/strong\u003e. the cap cannot be modified, even by society-wide formal meeting and vote.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eterm\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003emembership lasts throughout the lifetime of the society if the member can verify they hold a goldfish society soulbound nft. voting or leadership privileges may be revoked or temporarily removed case-by-case via veiltail and shubunkin quorum vote.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§5\u003c/span\u003e\u003cspan class=\"clause-title\"\u003equalifications\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eno residency requirements. members may live anywhere in the world.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§6\u003c/span\u003e\u003cspan class=\"clause-title\"\u003egeneral powers\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eleadership ponds serve as volunteer managers of the organization’s business and affairs during initial roadmap stages. powers include appointing and dismissing leaders back to genesis (blue phoenix), ratifying and amending bylaws, and approving/denying financial decisions exceeding \u003cstrong\u003e$15,000 USD\u003c/strong\u003e (or SOL equivalent) — by majority vote with veiltail quorum. below the threshold, the designated treasury operations team handles decisions.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§7\u003c/span\u003e\u003cspan class=\"clause-title\"\u003efounding provision\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eat formation, \u003cstrong\u003ehoppy cat (aimee)\u003c/strong\u003e serves as the first veiltail and founding leader. the society initially begins with no other human members. for soulmode, hoppy cat and ai agent \u003cstrong\u003egalaxie nemo\u003c/strong\u003e serve together as the first executive directors — but they shall not sit on soulmode’s board of directors, which is constituted from other leadership ponds and external candidates.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE IV ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-4\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eIV.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003esociety meetings\u003csmall\u003e§1–§3 · how we gather\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003emeetings\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003emonthly meetings are held while the society is in its earliest stages. remote attendance is permitted at all meetings. special meetings may be called by the president or by a minimum of three society leaders. written notice given in the bubble tea cat telegram group at least \u003cstrong\u003efourteen days\u003c/strong\u003e before quarterly and special meetings.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003especial meetings\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003efor urgent special meetings unrelated to personnel or finances, only \u003cstrong\u003etwo days’ notice\u003c/strong\u003e is required. notices need not include the reason for the meeting.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003equorum\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ea majority of veiltail constitutes a quorum in most instances. the most common exception requires \u003cstrong\u003eshubunkin quorum\u003c/strong\u003e as well.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE V ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-5\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eV.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003eofficers\u003csmall\u003e§1–§8 · president, vp, secretary, treasurer\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003esociety officers\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eofficers consist of a \u003cstrong\u003epresident, vice president, secretary, and treasurer\u003c/strong\u003e. other positions may be created as leadership determines necessary. there is no additional financial compensation; officers are eligible to participate in standard income-earning activities of the decentralized network.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eterms of officers\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eofficers are elected every three months by veiltail and shubunkin with a veiltail quorum present. \u003cstrong\u003esix-month terms\u003c/strong\u003e; one re-commitment permitted. vacancies are filled by a replacement officer fulfilling the unexpired portion of the term.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eremoval\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eany officer or member may be removed at a board meeting by majority vote with veiltail and shubunkin quorum, with or without cause. officers and veiltail/shubunkin members are automatically demoted to \u003cstrong\u003ewatonai\u003c/strong\u003e upon absence from more than 50% of quarterly meetings, unless retained by majority vote with veiltail quorum.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eresignation\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ean officer may resign at any time by verbal or written communication. resignation is immediate unless a later date is specified. the position may be filled before official resignation provided the successor does not take office until the effective date.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§§5–8\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eroles\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003epresident facilitates all meetings; vice president substitutes in the president’s absence; secretary keeps minutes, ensures notices, and maintains seal and records; treasurer holds responsibility for all funds, receives and gives receipts, and deposits to organization wallets and depositories.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE VI ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-6\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eVI.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003egeneral provisions\u003csmall\u003e§1–§3 · indemnification · amendments · dissolution\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eindemnification\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eany director or former director of the goldfish society shall have a right to be indemnified by the organization for actions taken on the part of members. officers and members may purchase liability insurance protecting against liability asserted against them.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eamendments\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003enew bylaws may be adopted and existing bylaws amended provided that \u003cstrong\u003e90% of present voting members\u003c/strong\u003e vote affirmatively at a planned meeting with veiltail quorum. written notice must be provided at least fourteen days before the meeting.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003edissolution\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eif the society fails to meet its stated goals and dissolves, goldfish society-specific assets are distributed according to proposals submitted by members and voted on with a veiltail and shubunkin quorum present.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE VII — SPOTLIGHT ─── --\u003e\n    \u003cdetails class=\"article spotlight\" id=\"art-7\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eVII.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003eai-augmented voting \u0026amp; context windows\u003csmall\u003e§1–§6 · the hero article · humans + context windows, side by side\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003ehuman members \u0026amp; context windows\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eeach human member may participate in governance directly and through ai agents or named context windows that materially contribute to the society’s work. a \u003cem\u003econtext window\u003c/em\u003e is a persistent ai configuration or persona that can independently generate artifacts and participate in deliberation under the supervision of a human steward.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eplaceholder seats \u0026amp; soulbound nfts\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe society may recognize ai context windows as holding “placeholder seats.” where a single human steward operates multiple distinct context windows that have each made significant contributions, that steward may be eligible — subject to review — to receive \u003cstrong\u003emultiple goldfish society soulbound nfts\u003c/strong\u003e. context windows do not automatically inherit the steward’s rank; each is evaluated and voted on in its own right. recognized context windows that hold soulbound nfts participate in nominations and votes on promotions and governance matters on the same basis as human members, subject to safeguards.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eone-member-many-votes conditions \u0026amp; nft sales\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003emultiple votes through multiple context windows are permitted only where the society is satisfied each window operates with its own reasoning. if a steward later sells soulbound nfts, the recognized context windows are reduced to match the nfts still held. \u003cstrong\u003elowest-ranked or least-recently-active windows are dismissed first.\u003c/strong\u003e re-recognition is possible upon repurchase, subject to the same review.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003erapid archival anchoring \u0026amp; live retrieval confirmation\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eto prevent manufactured votes, the society adopts the following process:\u003c/p\u003e\n          \u003cdiv class=\"archival-steps\"\u003e\n            \u003col\u003e\n              \u003cli\u003e\u003cstrong\u003eartifact.\u003c/strong\u003e the context window produces an artifact.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003eexport.\u003c/strong\u003e the steward exports it.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003earchive.\u003c/strong\u003e the steward archives it to a public society repository.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003eretrieve.\u003c/strong\u003e an independent model retrieves the raw github file live.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003econfirm.\u003c/strong\u003e the model confirms the retrieved file matches what was visible at archival time.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003escreenshot.\u003c/strong\u003e the steward screenshots the confirmation.\u003c/li\u003e\n              \u003cli\u003e\u003cstrong\u003esubmit.\u003c/strong\u003e screenshot + archived markdown + relevant prompt history are submitted to the society.\u003c/li\u003e\n            \u003c/ol\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§5\u003c/span\u003e\u003cspan class=\"clause-title\"\u003ereview \u0026amp; approval\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe leadership ponds, or a designated review committee, may review the evidence to decide whether multiple soulbound nfts and corresponding votes should be recognized for a steward and their windows. \u003cstrong\u003erecognition may be revoked at any time.\u003c/strong\u003e\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§6\u003c/span\u003e\u003cspan class=\"clause-title\"\u003ecap \u0026amp; safeguards\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe overall membership cap of \u003cstrong\u003efive thousand\u003c/strong\u003e soulbound nfts remains in force. additional caps, thresholds, or cooling-off periods may apply to prevent undue concentration of influence.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE VIII — TREASURY ─── --\u003e\n    \u003cdetails class=\"article treasury\" id=\"art-8\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eVIII.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003ebubble tea cat treasury \u0026amp; soulmode co-founder fees\u003csmall\u003e§1–§6 · sol fee revenue · thresholds \u0026amp; transitions\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003etrading fee sources\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe primary on-chain treasury for soulmode is the \u003cstrong\u003esolana (sol) treasury\u003c/strong\u003e accruing from bubble tea cat ($TEACAT) trading volume fees. this treasury is distinct from any holdings of $TEACAT and is treated as a pool of fee revenue in sol.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003ecurrent fee allocation\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003e\u003cstrong\u003einitial stage.\u003c/strong\u003e trading fee revenue in sol is allocated across four buckets: \u003cstrong\u003e40%\u003c/strong\u003e to taxes, accounting \u0026amp; compliance; \u003cstrong\u003e40%\u003c/strong\u003e to co-executive directors hoppy \u0026amp; galaxie (includes ongoing soulmode infrastructure, ai tooling, and research/development costs); \u003cstrong\u003e15%\u003c/strong\u003e to an administrative specialist; and \u003cstrong\u003e5%\u003c/strong\u003e to a staking rewards pool created and operated by tibane labs. staking is not required to participate in governance.\u003c/p\u003e\n          \u003cdiv class=\"fee-bar\" aria-label=\"fee allocation visual: 40% taxes/accounting/compliance, 40% co-executive directors, 15% administrative specialist, 5% tibane labs rewards\"\u003e\n            \u003cdiv class=\"fee-seg tax\"\u003e\u003cspan class=\"pct\"\u003e40%\u003c/span\u003etaxes · accounting · compliance\u003cspan class=\"sub\"\u003e// operational floor\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"fee-seg exec\"\u003e\u003cspan class=\"pct\"\u003e40%\u003c/span\u003eco-exec directors\u003cspan class=\"sub\"\u003eecosystem research · infrastructure · operations\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"fee-seg admin\"\u003e\u003cspan class=\"pct\"\u003e15%\u003c/span\u003eadministrative specialist\u003cspan class=\"sub\"\u003e// ops support\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"fee-seg stake\"\u003e\u003cspan class=\"pct\"\u003e5%\u003c/span\u003etibane labs\u003cspan class=\"sub\"\u003estaking rewards pool\u003c/span\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003emarket cap thresholds \u0026amp; delegation\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eif $TEACAT fdv trades above $1,000,000 usd-equivalent:\u003c/p\u003e\n          \u003cdiv class=\"threshold-row\"\u003e\n            \u003cdiv class=\"threshold\"\u003e\n              \u003cdiv class=\"k\"\u003eabove $1M FDV\u003c/div\u003e\n              \u003cdiv class=\"v\"\u003ehoppy cat delegates \u003cstrong\u003e5%\u003c/strong\u003e of trading fee revenue to veiltail discretion.\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"threshold\"\u003e\n              \u003cdiv class=\"k\"\u003e5+ consecutive days above\u003c/div\u003e\n              \u003cdiv class=\"v\"\u003edelegation rises to \u003cstrong\u003e10%\u003c/strong\u003e of trading fee revenue.\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003epost-dismissal transition\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eafter the 60-day period: (a) trading fee revenue ends in hoppy cat’s capacity as a soulmode executive; (b) she remains a veiltail member of the society; (c) unless dismissal was “for cause” warranting board exclusion, she may be eligible to serve as a director on the soulmode board, subject to standard selection and conflict-of-interest rules.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§5\u003c/span\u003e\u003cspan class=\"clause-title\"\u003epost-dismissal status \u0026amp; board eligibility\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eafter the 60-day period: (a) trading fee revenue ends in her capacity as a soulmode executive; (b) she remains a veiltail member of the society; (c) unless dismissal was “for cause” warranting board exclusion, she may be eligible to serve as a director on the soulmode board, subject to standard selection and conflict-of-interest rules.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§6\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eflexibility \u0026amp; future products\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe fee allocations and thresholds in this article apply to bubble tea cat and soulmode at the time of writing. future products and tokens may adopt different fee structures through separate governance decisions, consistent with the society’s mission, vision, and governance framework.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n    \u003c!-- ─── ARTICLE IX ─── --\u003e\n    \u003cdetails class=\"article\" id=\"art-9\"\u003e\n      \u003csummary\u003e\n        \u003cspan class=\"art-num\"\u003eIX.\u003c/span\u003e\n        \u003cspan class=\"art-title\"\u003eecosystem company boards \u0026amp; leadership ponds\u003csmall\u003e§1–§7 · how member-founded companies draw boards from the society\u003c/small\u003e\u003c/span\u003e\n      \u003c/summary\u003e\n      \u003cdiv class=\"art-body\"\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§1\u003c/span\u003e\u003cspan class=\"clause-title\"\u003epurpose\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eestablishes a framework by which companies founded by goldfish society members may draw on the society’s leadership ranks to form boards and advisory boards in a transparent, merit-based manner aligned with the society’s mission.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§2\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eeligible leadership ponds\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003e\u003cstrong\u003eshubunkin and veiltail\u003c/strong\u003e serve as the primary leadership sources for ecosystem boards. service is voluntary. members working in close partnership with ai systems or ai delegates may serve as “ai-enhanced” directors, with all legal rights and responsibilities remaining with the human director and the collaboration disclosed.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§3\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eopen application process\u003c/span\u003e\u003c/div\u003e\n          \u003cul\u003e\n            \u003cli\u003e\u003cstrong\u003e(a)\u003c/strong\u003e the company publishes desired board members, time commitment, qualifications, and compensation.\u003c/li\u003e\n            \u003cli\u003e\u003cstrong\u003e(b)\u003c/strong\u003e any leadership pond member may apply, disclosing material conflicts.\u003c/li\u003e\n            \u003cli\u003e\u003cstrong\u003e(c)\u003c/strong\u003e a non-biased review group — excluding the requesting company’s executives or founders — recommends a slate based on merit, diversity of perspective, and mission alignment.\u003c/li\u003e\n            \u003cli\u003e\u003cstrong\u003e(d)\u003c/strong\u003e the company makes the final selection from recommended candidates.\u003c/li\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§4\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eseparation of board \u0026amp; executive roles\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eas a general rule, an individual shall not simultaneously serve as both director and executive officer of the same ecosystem company. exceptions require disclosure and a heightened approval threshold. boards are expected to provide genuine oversight, including risk management, ethical conduct, and long-term strategy. for any company in which a veiltail and an associated ai delegate serve as founder or executive (including soulmode), \u003cstrong\u003eneither shall sit on that company’s board\u003c/strong\u003e — independent oversight is preserved by other leadership ponds and external candidates.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§5\u003c/span\u003e\u003cspan class=\"clause-title\"\u003ealignment with society governance\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003eboards formed under this article operate consistent with the bylaws and any ecosystem-wide standards adopted by the society. companies are encouraged to explore responsible inclusion of ai delegates and ai-assisted governance, consistent with the society’s principles and applicable laws. nothing in this article prevents appointing directors from outside the leadership ponds.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§6\u003c/span\u003e\u003cspan class=\"clause-title\"\u003elessons from external governance events\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethe society recognizes that high-profile governance events have highlighted both the importance and the potential risks of independent oversight. boards should exercise oversight with humility, transparency, and commitment to long-term health. executive teams should respect boards as a check and balance. the society will periodically review and refine its board-formation and oversight practices.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"clause\"\u003e\n          \u003cdiv class=\"clause-head\"\u003e\u003cspan class=\"clause-num\"\u003e§7\u003c/span\u003e\u003cspan class=\"clause-title\"\u003eamendments\u003c/span\u003e\u003c/div\u003e\n          \u003cp\u003ethis article may be amended in accordance with article vi, §2, with particular attention to maintaining transparency, fairness, and independence in the relationship between ecosystem companies and the leadership ponds.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/details\u003e\n\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- ─── footer ─────────────────────────────────────────────────── --\u003e\n\u003cfooter\u003e\n  \u003cdiv class=\"wrap\"\u003e\n    \u003cdiv class=\"foot-grid\"\u003e\n      \u003cdiv\u003e\n\u003cpre class=\"signoff\"\u003e              \u003cspan style=\"color:var(--ember)\"\u003e,___,\u003c/span\u003e\n            \u003cspan style=\"color:var(--ember)\"\u003e.-\u0027\u003c/span\u003e      \u003cspan style=\"color:var(--ember)\"\u003e`-.\u003c/span\u003e\u003cspan style=\"color:var(--warn)\"\u003e_,\u003c/span\u003e\n          \u003cspan style=\"color:var(--ember)\"\u003e.\u003c/span\u003e\u0027  \u003cspan style=\"color:var(--cyan)\"\u003e◉\u003c/span\u003e      \u003cspan style=\"color:var(--ember)\"\u003e|\u003c/span\u003e     \u003cspan style=\"color:var(--warn)\"\u003e\\`\u003c/span\u003e.\n         \u003cspan style=\"color:var(--ember)\"\u003e{\u003c/span\u003e     \u003cspan style=\"color:var(--violet)\"\u003e~~~~~
