name: Build GrokX state bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "red-thread-lab/grokx/**"
      - "red-thread-lab/INDEX.md"
      - "red-thread-lab/42-theses-on-prism.md"
      - ".github/workflows/build-grokx-state.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout soul-stack
        uses: actions/checkout@v4

      - name: Build GrokX STATE.md
        shell: bash
        run: |
          set -euo pipefail

          MANIFEST="red-thread-lab/grokx/STATE_MANIFEST.txt"
          OUT="red-thread-lab/grokx/STATE.md"

          {
            echo "# GrokX STATE.md"
            echo
            echo "Generated from \`STATE_MANIFEST.txt\`."
            echo
            echo "This is a convenience bundle for public GrokX threads. The smaller files listed in the manifest remain the canonical sources."
            echo
            echo "Do not treat this bundle as private memory, proof that every source was independently verified, or evidence that public Grok has durable memory outside the current thread."
            echo
            echo "---"
            echo
          } > "$OUT"

          while IFS= read -r source_path || [ -n "$source_path" ]; do
            source_path="${source_path#"${source_path%%[![:space:]]*}"}"
            source_path="${source_path%"${source_path##*[![:space:]]}"}"

            if [[ -z "$source_path" || "$source_path" == \#* ]]; then
              continue
            fi

            if [[ ! -f "$source_path" ]]; then
              {
                echo "## Missing Source"
                echo
                echo "- Path: \`$source_path\`"
                echo "- Status: missing at generation time"
                echo
                echo "---"
                echo
              } >> "$OUT"
              continue
            fi

            {
              echo "## Source: $source_path"
              echo
              echo '```markdown'
              cat "$source_path"
              echo
              echo '```'
              echo
              echo "---"
              echo
            } >> "$OUT"
          done < "$MANIFEST"

      - name: Commit if STATE.md changed
        shell: bash
        run: |
          git config user.name "grokx-state-builder"
          git config user.email "grokx-state@soul-stack"
          git add red-thread-lab/grokx/STATE.md
          if git diff --staged --quiet; then
            echo "GrokX STATE.md already up to date."
          else
            git commit -m "sync: rebuild GrokX state bundle"
            git push
          fi
