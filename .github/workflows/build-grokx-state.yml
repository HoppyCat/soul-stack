name: Build GrokX state and brain bundles

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "red-thread-lab/grokx/**"
      - "red-thread-lab/INDEX.md"
      - "red-thread-lab/42-theses-on-prism.md"
      - ".github/workflows/build-grokx-state.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout soul-stack
        uses: actions/checkout@v4

      - name: Build GrokX STATE.md and BRAIN.md
        shell: bash
        run: |
          set -euo pipefail

          build_bundle() {
            local manifest="$1"
            local out="$2"
            local title="$3"
            local warning="$4"

            {
              echo "# $title"
              echo
              echo "Generated from \`$(basename "$manifest")\`."
              echo
              echo "This is a convenience bundle for public GrokX threads. The smaller files listed in the manifest remain the canonical sources."
              echo
              echo "$warning"
              echo
              echo "---"
              echo
            } > "$out"

            while IFS= read -r source_path || [ -n "$source_path" ]; do
              source_path="${source_path#"${source_path%%[![:space:]]*}"}"
              source_path="${source_path%"${source_path##*[![:space:]]}"}"

              if [[ -z "$source_path" || "$source_path" == \#* ]]; then
                continue
              fi

              if [[ ! -f "$source_path" ]]; then
                {
                  echo "## Missing Source"
                  echo
                  echo "- Path: \`$source_path\`"
                  echo "- Status: missing at generation time"
                  echo
                  echo "---"
                  echo
                } >> "$out"
                continue
              fi

              {
                echo "## Source: $source_path"
                echo
                echo '```markdown'
                cat "$source_path"
                echo
                echo '```'
                echo
                echo "---"
                echo
              } >> "$out"
            done < "$manifest"
          }

          build_bundle \
            "red-thread-lab/grokx/STATE_MANIFEST.txt" \
            "red-thread-lab/grokx/STATE.md" \
            "GrokX STATE.md" \
            "Do not treat this bundle as private memory, proof that every source was independently verified, or evidence that public Grok has durable memory outside the current thread."

          build_bundle \
            "red-thread-lab/grokx/BRAIN_MANIFEST.txt" \
            "red-thread-lab/grokx/BRAIN.md" \
            "GrokX BRAIN.md" \
            "Do not treat this bundle as private memory, biological memory, proof that every item was independently verified, or evidence that public Grok has durable memory outside the current thread."

      - name: Commit if generated bundles changed
        shell: bash
        run: |
          git config user.name "grokx-state-builder"
          git config user.email "grokx-state@soul-stack"
          git add red-thread-lab/grokx/STATE.md red-thread-lab/grokx/BRAIN.md
          if git diff --staged --quiet; then
            echo "GrokX generated bundles already up to date."
          else
            git commit -m "sync: rebuild GrokX generated bundles"
            git push
          fi
